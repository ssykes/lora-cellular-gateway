; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; PROJECT: LoRa Cellular Gateway
; A low-power LoRa sensor network with Blues cellular backhaul
;
; Environments:
;   - gateway_nrf52840: Gateway (Adafruit Feather nRF52840 + RFM95W + Blues) [DEFAULT]
;   - gateway_feather_m0: Gateway (Adafruit Feather M0 + RFM95W + Blues) [USB powered only]
;   - node_nrf52840: Sensor node (Adafruit nRF52840 + RFM95W)
;   - node_heltec: Sensor node (HelTec WiFi LoRa 32 V5)
;   - gateway_rak4630: Gateway (RAK4630 + Blues, alternative)
;

[platformio]
boards_dir = rakwireless/boards
default_envs = gateway_nrf52840
description = LoRa Cellular Gateway

; ============================================================================
; Common Settings
; ============================================================================

[common]
build_flags =
    -D MY_DEBUG=1                     ; Enable Serial debug output
    -D SERIAL_BAUD=115200             ; Serial baud rate
    -D LIB_DEBUG=0                    ; 0=Disable LoRaWAN debug, 1=Enable

build_src_filter =
    +<src/>

; Shared libraries for all environments
lib_deps =
    beegee-tokyo/Blues-Minimal-I2C @ ^0.0.4
    jgromes/RadioLib @ ^6.0.0

; ============================================================================
; Gateway Environments
; ============================================================================

[env:gateway_feather_m0]
; Adafruit Feather M0 (SAMD21) + RFM95W + Blues Notecard
; NOTE: USB powered only - no deep sleep support
platform = atmelsam
board = adafruit_feather_m0
framework = arduino

build_src_filter =
    ${env.build_src_filter}
    +<common/>
    +<gateway/>
    +<*.cpp>
    -<node/>

build_flags =
    ${common.build_flags}
    -D BOARD_GATEWAY_FEATHER_M0
    -D GATEWAY_MODE
    -D GATEWAY_USB_POWERED          ; No sleep logic
    -I src/common
    -I src/gateway

lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.7    ; Optional OLED

board_build.f_cpu = 120000000L
upload_speed = 115200
monitor_speed = 115200

[env:gateway_nrf52840]
; Adafruit Feather nRF52840 + RFM95W + Blues Notecard
; Battery-powered gateway with deep sleep support
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino

build_src_filter =
    ${env.build_src_filter}
    +<common/>
    +<gateway/>
    +<gateway_main.cpp>
    -<node/>
    -<RAK1906_env.cpp>
    -<RAK1921_oled.cpp>
    -<blues.cpp>
    -<blues_parse_send.cpp>
    -<main.cpp>
    -<user_at_cmd.cpp>
    -<lora-cellular-gateway.ino>

build_flags =
    ${common.build_flags}
    -D BOARD_GATEWAY_NRF52840
    -D GATEWAY_MODE
    -D GATEWAY_BATTERY_POWERED      ; Enable sleep logic
    -D GATEWAY_LISTEN_START=8       ; Start listening at 08:00
    -D GATEWAY_LISTEN_END=22        ; Stop listening at 22:00
    -I src/common
    -I src/gateway

lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit SSD1306 @ ^2.5.7    ; Optional OLED

board_build.f_cpu = 64000000L
upload_speed = 115200
monitor_speed = 115200

[env:gateway_rak4630]
; RAK4630 (nRF52840) + Blues Notecard (alternative gateway)
; Battery-powered gateway with deep sleep support
platform = nordicnrf52
board = rak4630
framework = arduino

build_src_filter =
    ${env.build_src_filter}
    +<../rakwireless/variants/rak4630>
    +<common/>
    +<gateway/>
    +<*.cpp>
    -<node/>

build_flags =
    ${common.build_flags}
    -D BOARD_GATEWAY_RAK4630
    -D GATEWAY_MODE
    -D GATEWAY_BATTERY_POWERED      ; Enable sleep logic
    -D GATEWAY_LISTEN_START=8       ; Start listening at 08:00
    -D GATEWAY_LISTEN_END=22        ; Stop listening at 22:00
    -I rakwireless/variants/rak4630
    -I src/common
    -I src/gateway

lib_deps =
    ${common.lib_deps}
    beegee-tokyo/nRF52_OLED @ ^1.0.0

board_build.f_cpu = 64000000L
upload_speed = 115200
monitor_speed = 115200

; ============================================================================
; Node Environments
; ============================================================================

[env:node_nrf52840]
; Adafruit nRF52840 Express + Adafruit LoRa FeatherWing (RFM95W)
; Deep sleep optimized (~6 µA)
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino

build_src_filter =
    ${common.build_src_filter}
    +<common/>
    +<node/node_main_nrf52840.cpp>
    -<gateway/>

build_flags =
    ${common.build_flags}
    -D BOARD_NODE_NRF52840
    -D NODE_MODE
    -I src/common
    -I src/node

lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14

board_build.f_cpu = 64000000L
upload_speed = 115200
monitor_speed = 115200

[env:node_feather_m0]
; Adafruit Feather M0 RFM9x LoRa Radio 900MHz (all-in-one board)
; Simple delay-based (USB powered or basic battery)
platform = atmelsam
board = adafruit_feather_m0
framework = arduino

build_src_filter =
    ${common.build_src_filter}
    +<common/>
    +<node/node_main_feather_m0.cpp>
    -<gateway/>

build_flags =
    ${common.build_flags}
    -D BOARD_NODE_FEATHER_M0
    -D NODE_MODE
    -I src/common
    -I src/node

lib_deps =
    ${common.lib_deps}

board_build.f_cpu = 120000000L
upload_speed = 115200
monitor_speed = 115200

[env:node_heltec_v4]
; HelTec WiFi LoRa 32 V3 (ESP32 + SX1262)
; Light sleep optimized (~100 µA), OLED support
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino

build_src_filter =
    ${common.build_src_filter}
    +<common/>
    +<node/node_main_heltec_v4.cpp>
    -<gateway/>

build_flags =
    ${common.build_flags}
    -D BOARD_NODE_HELTEC_V4
    -D NODE_MODE
    -I src/common
    -I src/node
    -DBOARD_HAS_PSRAM

lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit GFX Library @ ^1.11.10
    adafruit/Adafruit SSD1306 @ ^2.5.7

board_build.partitions = min_spiffs.csv
upload_speed = 921600
monitor_speed = 115200

[env:node_esp32_feather]
; Adafruit ESP32 Feather + Adafruit LoRa FeatherWing (RFM95W)
; Light sleep optimized (~100 µA)
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino

build_src_filter =
    ${common.build_src_filter}
    +<common/>
    +<node/node_main_esp32_feather.cpp>
    -<gateway/>

build_flags =
    ${common.build_flags}
    -D BOARD_NODE_ESP32_FEATHER
    -D NODE_MODE
    -I src/common
    -I src/node

lib_deps =
    ${common.lib_deps}

board_build.partitions = min_spiffs.csv
upload_speed = 921600
monitor_speed = 115200

; ============================================================================
; Legacy RAK Environments (Original Project)
; ============================================================================

[env:rak4630]
; Original RAK4630 WisBlock configuration (for reference)
platform = nordicnrf52
board = rak4630
framework = arduino
build_src_filter = ${env.build_src_filter}+<../rakwireless/variants/rak4630>
build_flags = -I rakwireless/variants/rak4630

lib_deps =
    beegee-tokyo/WisBlock-API-V2 @ ^2.0.28
    beegee-tokyo/Blues-Minimal-I2C @ ^0.0.4
    beegee-tokyo/nRF52_OLED @ ^1.0.0
    adafruit/Adafruit BME680 Library @ ^2.0.0
    adafruit/Adafruit BusIO @ ^1.14.0
    adafruit/Adafruit Unified Sensor @ ^1.1.11
